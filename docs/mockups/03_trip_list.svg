<svg viewBox="0 0 380 1380" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="t d">
<title id="t">여행 목록 화면</title>
<desc id="d">필터 + 4가지 상태 배지가 있는 카드 리스트</desc>
<defs>
<style><![CDATA[
text{font-family:system-ui,-apple-system,sans-serif}
.c-teal{fill:#9FE1CB}.c-amber{fill:#FAC775}.c-coral{fill:#F5C4B3}.c-pink{fill:#F4C0D1}.c-gray{fill:#D3D1C7}.c-blue{fill:#B5D4F4}.c-purple{fill:#CECBF6}
.lbl{font-size:12px;font-weight:500;fill:#6b6b6b}
.h{font-size:14px;font-weight:500;fill:#1f1f1f}
.h2{font-size:16px;font-weight:500;fill:#1f1f1f}
.bs{font-size:11px;fill:#6b6b6b}
.bxs{font-size:10px;fill:#9b9b9b}
.title{font-size:13px;font-weight:500;fill:#1f1f1f}
.badge{font-size:10px;font-weight:500}
.thumb-lbl{font-size:9px;text-anchor:middle}
]]></style>
</defs>
<text x="14" y="20" class="lbl">여행 목록 — 4가지 상태 카드</text>
<rect x="10" y="32" width="360" height="1340" rx="14" fill="#ffffff" stroke="#c5c5c5" stroke-width="0.5"/>
<rect x="10" y="32" width="360" height="22" rx="14" fill="#f5f5f5"/>
<rect x="10" y="46" width="360" height="8" fill="#f5f5f5"/>
<text x="22" y="48" class="bxs">9:41</text>
<text x="346" y="48" class="bxs" text-anchor="end">●●●</text>
<text x="22" y="78" class="h2">여행 목록</text>
<text x="334" y="78" class="h" text-anchor="middle">⌕</text>
<text x="354" y="78" class="h" text-anchor="middle">⚙</text>
<g transform="translate(22, 96)" font-size="11">
<rect x="0" y="0" width="48" height="28" rx="14" class="c-teal"/>
<text x="24" y="18" font-weight="500" text-anchor="middle" fill="#04342C">전체</text>
<rect x="56" y="0" width="60" height="28" rx="14" fill="#ffffff" stroke="#c5c5c5" stroke-width="0.5"/>
<text x="86" y="18" text-anchor="middle" fill="#1f1f1f">trip</text>
<rect x="124" y="0" width="72" height="28" rx="14" fill="#ffffff" stroke="#c5c5c5" stroke-width="0.5"/>
<text x="160" y="18" text-anchor="middle" fill="#1f1f1f">camping</text>
<rect x="204" y="0" width="58" height="28" rx="14" fill="#ffffff" stroke="#c5c5c5" stroke-width="0.5"/>
<text x="233" y="18" text-anchor="middle" fill="#1f1f1f">상태 ▾</text>
<rect x="270" y="0" width="58" height="28" rx="14" fill="#ffffff" stroke="#c5c5c5" stroke-width="0.5"/>
<text x="299" y="18" text-anchor="middle" fill="#1f1f1f">2026 ▾</text>
</g>
<text x="22" y="156" class="bxs">14건 · 최근순 ▾</text>
<line x1="22" y1="170" x2="358" y2="170" stroke="#e5e5e5" stroke-width="0.5"/>

<!-- Card 1: 진행 중 -->
<rect x="22" y="184" width="336" height="100" rx="10" fill="#ffffff" stroke="#e5e5e5" stroke-width="0.5"/>
<rect x="32" y="194" width="80" height="80" rx="8" class="c-teal"/>
<text x="72" y="232" font-size="20" text-anchor="middle" fill="#04342C">📷</text>
<text x="124" y="208" class="title">제주도 봄여행</text>
<rect x="284" y="194" width="68" height="20" rx="10" class="c-amber"/>
<text x="318" y="208" class="badge" text-anchor="middle" fill="#854F0B">● 진행 중</text>
<text x="124" y="228" class="bs">2026.05.12 ~ 미정 · trip</text>
<text x="124" y="252" class="bxs">사진 14장 · ₩240,000 · 4일째</text>

<!-- Card 2: 종료일 미정 -->
